<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  function generatePromptPayPayload(phone, amount) {
    const norm = '0066' + phone.substring(1);

    function f(id, val) {
      const len = val.length.toString().padStart(2, '0');
      return id + len + val;
    }

    function crc16(str) {
      let crc = 0xFFFF;
      for (let i = 0; i < str.length; i++) {
        crc ^= str.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
        }
      }
      return ((crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0'));
    }

    const merchantInfo = f('00', 'A000000677010111') + f('01', norm);
    const payload =
      f('00', '01') +
      f('01', '12') +
      f('29', merchantInfo) +
      f('53', '764') +
      f('54', amount.toFixed(2)) +
      f('58', 'TH') +
      f('59', 'N/A') +
      f('60', 'Bangkok') +
      '6304';

    return payload + crc16(payload);
  }

  function showQR(amount, btn) {
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    const payload = generatePromptPayPayload('0828642113', amount);

    QRCode.toCanvas(document.getElementById('qr-canvas'), payload, {
      width: 200,
      margin: 2,
      color: { dark: '#000000', light: '#ffffff' }
    });

    document.getElementById('qr-section').style.display = 'block';
    document.getElementById('default-note').style.display = 'none';
  }
</script>
